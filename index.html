<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RuntimeDB</title>
  <meta name="description" content="Base de données des différentes versions de films et de leurs durées." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="navbar__inner">
      <div class="brand">
        <span class="logo-text">Runtime<span class="accent">DB</span></span>
        <span class="stats" id="stats"></span>
      </div>
      <div class="searchbar">
        <input id="searchInput" type="search" placeholder="Rechercher un film, une version, un type..." autocomplete="off" />
      </div>
    </div>
  </header>

  <main class="page">
    <div id="status" class="status">Chargement de la base de données…</div>
    <section id="movies" class="movies"></section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
